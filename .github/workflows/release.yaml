name: Release CLI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write # Required for npm OIDC trusted publishers

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.ADMIN_APP_ID }}
          private-key: ${{ secrets.ADMIN_APP_PRIVATE_KEY }}
          repositories: cli,homebrew-tap

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          # Node 24 LTS bundles npm >= 11.5.1, which supports npm OIDC trusted publishing.
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Clean templates
        run: make clean-templates

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser-pro
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
